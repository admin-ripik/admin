<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks for your interest!</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 500px;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    h2 {
      color: #111;
      margin-bottom: 15px;
    }

    p {
      color: #666;
      line-height: 1.5;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

<div class="card">

  <div id="loading">
    <div class="spinner"></div>
    <h2>Confirming your interest...</h2>
    <p>Please wait...</p>
  </div>

  <div id="success" style="display:none;">
    <h2>You're all set! 🎉</h2>
    <p>Thanks for your interest. We'll be in touch shortly.</p>
  </div>

  <div id="error" style="display:none;">
    <h2>Something went wrong</h2>
    <p id="errorMessage">
      Please try clicking the link again.
    </p>
  </div>

</div>

<script>

window.addEventListener("load", async () => {

    console.log("Current URL:", window.location.href);

    const params = new URLSearchParams(window.location.search);

    console.log("URL Parameters:");

    for (const [key, value] of params.entries()) {
        console.log(key, value);
    }

    const email = params.get("email");

    if (!email) {

        document.getElementById("loading").style.display = "none";

        document.getElementById("error").style.display = "block";

        document.getElementById("errorMessage").innerText =
            "No email parameter was found in the URL.";

        return;
    }

    try {

        const response = await fetch(
            "https://script.google.com/macros/s/AKfycbykpw-r8RpdqhnXuusNZzOX_KrknVho87nI8whPAwnRObE0qF0b5CtcoVbJKpqMmDPCuw/exec",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    name: params.get("name") || "",
                    title: params.get("title") || "",
                    company: params.get("company") || "",
                    source: "apollo outbound"
                })
            }
        );

        const result = await response.text();

        console.log("HTTP Status:", response.status);
        console.log("Server Response:", result);

        if (!response.ok) {
            throw new Error(result || "Server returned an error.");
        }

        document.getElementById("loading").style.display = "none";
        document.getElementById("success").style.display = "block";

    } catch (err) {

        console.error(err);

        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "block";

        document.getElementById("errorMessage").innerText =
            err.message || "Unable to contact the server.";
    }

});

</script>

</body>
</html>
