<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanks for your interest!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      width: 90%;
      max-width: 500px;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }
    h2 { color: #111; margin-bottom: 15px; }
    p { color: #666; line-height: 1.5; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid #ddd;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      margin: 0 auto 20px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .confirm-btn {
      display: inline-block;
      background-color: #2563EB;
      color: #FFFFFF;
      text-decoration: none;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 28px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    .confirm-btn:hover { background-color: #1d4ed8; }
    .debug {
      margin-top: 20px;
      font-size: 11px;
      color: #999;
      word-break: break-all;
      text-align: left;
      background: #fafafa;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>
<div class="card">
  <div id="confirm">
    <h2>Confirm your interest</h2>
    <p>Click below to let us know you're interested — we'll follow up shortly.</p>
    <button class="confirm-btn" id="confirmBtn">Yes, I'm Interested</button>
  </div>
  <div id="loading" style="display:none;">
    <div class="spinner"></div>
    <h2>Confirming your interest...</h2>
    <p>Please wait...</p>
  </div>
  <div id="success" style="display:none;">
    <h2>You're all set! 🎉</h2>
    <p>Thanks for your interest. We'll be in touch shortly.</p>
    <div class="debug" id="debugSuccess"></div>
  </div>
  <div id="error" style="display:none;">
    <h2>Something went wrong</h2>
    <p id="errorMessage">Please try clicking the link again.</p>
    <div class="debug" id="debugError"></div>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (!email) {
    document.getElementById("confirm").style.display = "none";
    document.getElementById("error").style.display = "block";
    document.getElementById("errorMessage").innerText =
        "No email parameter was found in the URL.";
} else {
    document.getElementById("confirmBtn").addEventListener("click", async () => {
        document.getElementById("confirm").style.display = "none";
        document.getElementById("loading").style.display = "block";

        try {
            const response = await fetch(
                "https://script.google.com/macros/s/AKfycbykpw-r8RpdqhnXuusNZzOX_KrknVho87nI8whPAwnRObE0qF0b5CtcoVbJKpqMmDPCuw/exec",
                {
                    method: "POST",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({
                        email: email,
                        name: params.get("name") || "",
                        title: params.get("title") || "",
                        company: params.get("company") || "",
                        source: "apollo outbound"
                    })
                }
            );
            const result = await response.text();

            if (!response.ok) {
                throw new Error(result || "Server returned an error.");
            }
            document.getElementById("loading").style.display = "none";
            document.getElementById("success").style.display = "block";
            document.getElementById("debugSuccess").innerText = result; // <-- shows diagnostics on-page
        } catch (err) {
            document.getElementById("loading").style.display = "none";
            document.getElementById("error").style.display = "block";
            document.getElementById("errorMessage").innerText =
                err.message || "Unable to contact the server.";
            document.getElementById("debugError").innerText = err.message || "";
        }
    });
}
</script>
</body>
</html>
